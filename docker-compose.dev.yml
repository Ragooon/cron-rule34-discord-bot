services:

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rule34-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/rule34bot?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RULE34_API_KEY=${RULE34_API_KEY}
      - RULE34_USER_ID=${RULE34_USER_ID}
      - GELBOORU_API_KEY=${GELBOORU_API_KEY}
      - GELBOORU_USER_ID=${GELBOORU_USER_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot-network
    profiles:
      - production

  redis:
    image: redis:7-alpine
    container_name: rule34-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  postgres:
    image: postgres:16-alpine
    container_name: rule34-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rule34bot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rule34bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:

